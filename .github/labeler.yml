# actions/labeler v5 schema

"area:setup":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - "package.json"
          - "pnpm-lock.yaml"
          - "yarn.lock"
          - "tsconfig*.json"
          - ".eslintrc*"
          - ".prettierrc*"
          - "next.config.*"

"area:auth":
  - changed-files:
      - any-glob-to-any-file:
          - "src/app/(auth)/**"
          - "src/app/api/auth/**"
          - "src/app/api/session/**"
          - "src/app/_lib/supabase/**"

"area:db":
  - changed-files:
      - any-glob-to-any-file:
          - "prisma/**"
          - "src/app/_lib/prisma.ts"
          - "src/app/_lib/db/**"

"area:rooms":
  - changed-files:
      - any-glob-to-any-file:
          - "src/app/api/rooms/**"
          - "src/app/(rooms)/**"
          - "src/components/rooms/**"

"area:chat":
  - changed-files:
      - any-glob-to-any-file:
          - "src/app/api/rooms/*/messages/**"
          - "src/app/(chat)/**"
          - "src/components/chat/**"

"area:i18n":
  - changed-files:
      - any-glob-to-any-file:
          - "src/i18n/**"
          - "src/locales/**"
          - "locales/**"
          - "**/*i18n*.ts"
          - "**/*i18n*.tsx"
          - "**/*i18n*.js"

"area:realtime":
  - changed-files:
      - any-glob-to-any-file:
          - "src/app/_lib/redis.ts"
          - "src/app/_lib/realtime/**"
          - "src/app/api/realtime/**"
          - "src/app/**/socket/**"

"area:design-system":
  - changed-files:
      - any-glob-to-any-file:
          - "src/components/ui/**"
          - "src/styles/**"
          - "src/tokens/**"

"type:docs":
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"
          - "docs/**"
          - "**/*.md"
          - "**/*.mdx"
